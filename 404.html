<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Not found &middot; Nail &amp; Tally</title>
<meta name="robots" content="index">
<style>
:root{--navy:#0f1f3d;--ink:#1a2233;--muted:#5b6577;--line:#e3e7ee;--bg:#f6f8fb;--accent:#2f6fed}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,Segoe UI,Inter,Roboto,Helvetica,Arial,sans-serif;line-height:1.65;font-size:17px}
header.site{background:var(--navy);color:#fff;padding:22px 0}
header.site .wrap{display:flex;align-items:center;gap:14px}
.logo{display:flex;align-items:center;gap:11px;text-decoration:none;color:#fff}
.stack{display:flex;flex-direction:column;gap:2px}
.stack span{display:block;width:26px;height:5px;border-radius:1px;background:#fff;opacity:.92}
.stack span:nth-child(2){width:20px;opacity:.7}.stack span:nth-child(3){width:14px;opacity:.5}
.brand{font-weight:700;font-size:19px;letter-spacing:.2px}
nav.site{margin-left:auto;display:flex;gap:18px}
nav.site a{color:#cdd6e6;text-decoration:none;font-size:15px}
nav.site a:hover{color:#fff}
.wrap{max-width:780px;margin:0 auto;padding:0 22px}
main{background:#fff;border:1px solid var(--line);border-radius:14px;padding:34px 38px;margin:30px auto;max-width:780px;box-shadow:0 1px 3px rgba(16,32,64,.05)}
h1{color:var(--navy);font-size:30px;margin:0 0 6px;line-height:1.2}
h2{color:var(--navy);font-size:21px;margin:34px 0 10px;padding-top:8px;border-top:1px solid var(--line)}
h2:first-of-type{border-top:none}
.meta{color:var(--muted);font-size:14px;margin:0 0 8px}
.callout{background:#eef3fe;border:1px solid #d4e0fb;border-radius:10px;padding:14px 16px;font-size:15px;margin:18px 0}
ul{padding-left:22px}li{margin:6px 0}
a{color:var(--accent)}
strong{color:var(--ink)}
footer.site{color:var(--muted);font-size:13px;text-align:center;padding:26px 22px 50px}
footer.site a{color:var(--muted)}
.btn{display:inline-block;background:var(--accent);color:#fff;text-decoration:none;padding:11px 18px;border-radius:9px;font-weight:600;margin-top:6px}
.home-card{display:block;border:1px solid var(--line);border-radius:11px;padding:18px 20px;margin:12px 0;text-decoration:none;color:var(--ink);transition:border-color .15s}
.home-card:hover{border-color:var(--accent)}
.home-card b{color:var(--navy);font-size:18px}
.home-card p{margin:4px 0 0;color:var(--muted);font-size:15px}
@media(max-width:560px){main{padding:24px 20px;margin:18px 14px}h1{font-size:25px}body{font-size:16px}}
</style></head><body>
<header class="site"><div class="wrap"><a class="logo" href="/">
<span class="stack"><span></span><span></span><span></span></span>
<span class="brand">Nail &amp; Tally</span></a>
<nav class="site"><a href="/privacy">Privacy</a><a href="/terms">Terms</a><a href="/delete-account">Delete account</a></nav>
</div></header>
<main><h1>Page not found</h1><p>That page does not exist. Try the <a href="/">home page</a>.</p></main>

</body></html>
